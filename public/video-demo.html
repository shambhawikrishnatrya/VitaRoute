<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitaRoute - Platform Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617;
      --surface: #0f172a;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    nav {
      width: 100%;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -1px;
      text-decoration: none;
      color: #fff;
    }
    .back-btn {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      transition: all 0.2s;
      background: rgba(255,255,255,0.05);
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
    }
    main {
      flex: 1;
      width: 100%;
      max-width: 1200px;
      padding: 60px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .label {
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: inline-block;
      padding: 4px 12px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 20px;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 16px 0;
      letter-spacing: -1px;
    }
    p {
      color: var(--text-muted);
      font-size: 18px;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }
    .video-container {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/9;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    iframe, video {
      width: 100%;
      height: 100%;
      border: none;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      opacity: 0; /* Hidden by default if using a real video */
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">VitaRoute</a>
    <a href="#" class="back-btn" onclick="sessionStorage.setItem('returnToDashboard', 'true'); window.location.href='index.html'; return false;">← Back to Command Center</a>
  </nav>

  <main>
    <div class="header">
      <div class="label">Product Walkthrough</div>
      <h1>See VitaRoute in Action</h1>
      <p>Watch how our AI-powered routing engine eliminates delays and guides emergency vehicles through the fastest available paths.</p>
    </div>

    <div class="video-container">
      <!-- Placeholder Video. In a real scenario, this could be an AI generated video or a YouTube embed -->
      <video controls autoplay muted loop>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
      </video>
    </div>
  </main>

</body>
</html>
